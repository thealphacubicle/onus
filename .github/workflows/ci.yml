name: CI

on:
  push:
    branches: [develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Lint (auto-fix, non-blocking)
        run: npm run lint -- --fix
        continue-on-error: true

      - name: Build
        run: npm run build
